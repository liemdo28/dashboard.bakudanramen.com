name: Deploy to DreamHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DREAMHOST_HOST: pdx1-shared-a3-05.dreamhost.com
      DREAMHOST_USER: liemdo0208

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DREAMHOST_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 "$DREAMHOST_HOST" >> ~/.ssh/known_hosts

      - name: Upload to DreamHost
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            -e "ssh -i $HOME/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./ "$DREAMHOST_USER@$DREAMHOST_HOST:~/dashboard.bakudanramen.com/"
