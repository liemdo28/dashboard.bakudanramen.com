name: Deploy to DreamHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DREAMHOST_HOST: pdx1-shared-a3-05.dreamhost.com
      DREAMHOST_USER: liemdo0208

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DREAMHOST_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub
          ssh-keygen -lf ~/.ssh/id_rsa
          ssh-keyscan -p 22 "$DREAMHOST_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH login
        run: |
          ssh -T "$DREAMHOST_USER@$DREAMHOST_HOST" \
            -i "$HOME/.ssh/id_rsa" \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "echo 'SSH OK'"

      - name: Upload to DreamHost
        run: |
          export RSYNC_RSH="ssh -i $HOME/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o IdentityAgent=none \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes"
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ "$DREAMHOST_USER@$DREAMHOST_HOST:~/dashboard.bakudanramen.com/"
