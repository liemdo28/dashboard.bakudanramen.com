name: Deploy to DreamHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DREAMHOST_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 pdx1-shared-a3-05.dreamhost.com >> ~/.ssh/known_hosts
          printf "Host dreamhost\n  HostName pdx1-shared-a3-05.dreamhost.com\n  User liemdo0208\n  IdentityFile ~/.ssh/id_rsa\n  IdentitiesOnly yes\n  PubkeyAuthentication yes\n" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Upload to DreamHost
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            -e "ssh -F ~/.ssh/config" \
            ./ dreamhost:~/dashboard.bakudanramen.com/